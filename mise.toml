[env]
_.file = ".env"

[tools]
opentofu = "1.12"
1password-cli = "latest"

[tasks."op:whoami"]
description = "test that OP_SERVICE_ACCOUNT_TOKEN auth works"
run = "op whoami"

[tasks."op:read"]
description = "read a secret from 1Password, e.g. mise run op:read -- op://vault/item/field"
run = "op read"

[tasks."tofu:lab:init"]
description = "tofu init for tofu/lab, wiring up the pg backend config"
dir = "{{config_root}}/infrastructure/lab"
run = "tofu init -backend-config=backend.hcl"

[tasks."tofu:lab:plan"]
description = "tofu plan for tofu/lab"
dir = "{{config_root}}/infrastructure/lab"
run = "tofu plan"

[tasks."tofu:lab:apply"]
description = "tofu apply for tofu/lab"
dir = "{{config_root}}/infrastructure/lab"
run = "tofu apply"

[tasks."tofu:lab:validate"]
description = "validate tofu/lab config"
dir = "{{config_root}}/infrastructure/lab"
run = "tofu validate"

[tasks."tofu:lab:check"]
description = "check formatting and validity of tofu/lab configs"
depends = [
  "tofu:lab:validate",
]

[tasks."tofu:testbed:init"]
description = "tofu init for tofu/testbed, wiring up the pg backend config"
dir = "{{config_root}}/infrastructure/testbed"
run = "tofu init -backend-config=backend.hcl"

[tasks."tofu:testbed:plan"]
description = "tofu plan for tofu/testbed"
dir = "{{config_root}}/infrastructure/testbed"
run = "tofu plan"

[tasks."tofu:testbed:apply"]
description = "tofu apply for tofu/testbed"
dir = "{{config_root}}/infrastructure/testbed"
run = "tofu apply"

[tasks."tofu:testbed:validate"]
description = "validate tofu/testbed config"
dir = "{{config_root}}/infrastructure/testbed"
run = "tofu validate"

[tasks."tofu:testbed:check"]
description = "check formatting and validity of tofu/testbed configs"
depends = [
  "tofu:testbed:validate",
]

[tasks."tofu:fmt"]
description = "check formatting and modify files for all tofu configs"
dir = "{{config_root}}/infrastructure"
run = "tofu fmt -diff -recursive"

[tasks."tofu:fmt-check"]
description = "check formatting of all tofu configs without modifying files"
dir = "{{config_root}}/infrastructure"
run = "tofu fmt -check -diff -recursive"

[tasks."tofu:check"]
description = "check formatting and validity of all tofu configs"
depends = [
  "tofu:fmt-check",
  "tofu:lab:check",
  "tofu:testbed:check",
]
